{% extends 'base.html' %}
{% block title %}Edit Item - SmartFood{% endblock %}
{% block content %}
<div class="grid-2 justify-content-center">
    <div >
        <div class="modern-card border-0">
            <div class="card-header fw-bold">
                <i class="bi bi-pencil me-2"></i>Edit: {{ item.name }}
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="/inventory/" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
