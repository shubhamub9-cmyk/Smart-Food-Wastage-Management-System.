{% extends 'base.html' %}
{% block title %}Delete Item - SmartFood{% endblock %}
{% block content %}
<div class="grid-2 justify-content-center">
    <div >
        <div class="modern-card border-0 border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-trash-fill text-danger fs-1"></i>
                <h5 class="mt-4">Delete "{{ item.name }}"?</h5>
                <p class="text-muted">{{ item.quantity }} {{ item.unit }} &mdash; Expires: {{ item.expiry_date }}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="/inventory/" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
