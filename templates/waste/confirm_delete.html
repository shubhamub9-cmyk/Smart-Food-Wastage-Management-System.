{% extends 'base.html' %}
{% block title %}Delete Waste Log - SmartFood{% endblock %}
{% block content %}
<div class="grid-2 justify-content-center">
    <div >
        <div class="modern-card border-0">
            <div class="card-body text-center py-5">
                <i class="bi bi-trash-fill text-danger fs-1"></i>
                <h5 class="mt-4">Delete waste log for "{{ log.food_name }}"?</h5>
                <p class="text-muted">{{ log.quantity }} {{ log.unit }} logged on {{ log.date }}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="/waste/" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
